<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers — Inventory Management System</title>
  <meta name="description" content="Manage customers for sales tracking.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Public+Sans:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-layout">
    <nav class="pegboard-nav">
      <div class="nav-brand"><svg class="brand-icon" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="15" stroke="#EAE4D8" stroke-width="2" fill="none"/><path d="M 7 26 A 13 13 0 0 1 29 26" stroke="#4a4a40" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M 7 26 A 13 13 0 0 1 24 10" stroke="#EAE4D8" stroke-width="3" fill="none" stroke-linecap="round"/><line x1="18" y1="18" x2="22" y2="11" stroke="#C8862B" stroke-width="2" stroke-linecap="round"/><circle cx="18" cy="18" r="2.5" fill="#C8862B"/></svg><h2>IMS</h2></div>
      <ul class="nav-links">
        <li><a href="dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Dashboard</span></a></li>
        <li><a href="products.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span>Products</span></a></li>
        <li><a href="category.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg><span>Categories</span></a></li>
        <li><a href="suppliers.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 3h15v13H1z"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg><span>Suppliers</span></a></li>
        <li><a href="customers.html" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Customers</span></a></li>
        <li><a href="purchase.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span>Purchases</span></a></li>
        <li><a href="sales.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg><span>Sales</span></a></li>
        <li><a href="report.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Reports</span></a></li>
      </ul>
      <div class="nav-footer"><div class="user-info"><div class="user-avatar">A</div><div class="user-details"><div class="user-name">Admin</div><div class="user-role">admin</div></div></div><button class="btn-logout" id="btn-logout">Sign Out</button></div>
    </nav>

    <main class="main-content">
      <header class="top-bar"><span class="page-title">Customers</span><div class="top-bar-actions"></div></header>
      <div class="page-content">
        <div class="page-header">
          <h1>Customers</h1>
          <div class="header-actions">
            <div class="view-toggle">
              <button id="view-grid" title="Grid"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></button>
              <button id="view-table" class="active" title="Table"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>
            </div>
            <button class="btn btn-primary" id="btn-add-customer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Customer</button>
          </div>
        </div>
        <div id="customers-grid" class="collection-grid hidden"></div>
        <div id="customers-table" class="dense-table-wrapper">
          <table class="dense-table"><thead><tr><th>ID</th><th>Name</th><th>Phone</th><th>Email</th><th>Orders</th><th>Actions</th></tr></thead><tbody id="customers-table-body"></tbody></table>
        </div>
      </div>
    </main>
  </div>

  <div class="side-panel-overlay" id="customer-panel-overlay"></div>
  <div class="side-panel" id="customer-panel">
    <div class="side-panel-header"><h2 id="panel-title">Add Customer</h2><button class="btn btn-ghost btn-icon" onclick="closePanel('customer-panel')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="side-panel-body">
      <form id="customer-form">
        <div class="form-group"><label for="customer-name">Name *</label><input type="text" id="customer-name" required placeholder="Customer name"></div>
        <div class="form-row">
          <div class="form-group"><label for="customer-phone">Phone</label><input type="text" id="customer-phone" placeholder="Phone number"></div>
          <div class="form-group"><label for="customer-email">Email</label><input type="email" id="customer-email" placeholder="Email address"></div>
        </div>
        <div class="form-group"><label for="customer-address">Address</label><textarea id="customer-address" placeholder="Full address"></textarea></div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:var(--space-md);"><button type="button" class="btn btn-outline" onclick="closePanel('customer-panel')">Cancel</button><button type="submit" class="btn btn-primary">Save</button></div>
      </form>
    </div>
  </div>

  <script src="../js/ui/dialog.js"></script>
  <script src="../js/ui/toast.js"></script>
  <script src="../js/auth-check.js"></script>
  <script src="../js/customer.js"></script>
</body>
</html>
