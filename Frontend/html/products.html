<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — Inventory Management System</title>
  <meta name="description" content="Manage products, view stock levels, and update inventory.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Public+Sans:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-layout">
    <!-- Pegboard Nav -->
    <nav class="pegboard-nav">
      <div class="nav-brand">
        <svg class="brand-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="18" cy="18" r="15" stroke="#EAE4D8" stroke-width="2" fill="none"/>
          <path d="M 7 26 A 13 13 0 0 1 29 26" stroke="#4a4a40" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M 7 26 A 13 13 0 0 1 24 10" stroke="#EAE4D8" stroke-width="3" fill="none" stroke-linecap="round"/>
          <line x1="18" y1="18" x2="22" y2="11" stroke="#C8862B" stroke-width="2" stroke-linecap="round"/>
          <circle cx="18" cy="18" r="2.5" fill="#C8862B"/>
        </svg>
        <h2>IMS</h2>
      </div>
      <ul class="nav-links">
        <li><a href="dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Dashboard</span></a></li>
        <li><a href="products.html" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg><span>Products</span></a></li>
        <li><a href="category.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg><span>Categories</span></a></li>
        <li><a href="suppliers.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 3h15v13H1z"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg><span>Suppliers</span></a></li>
        <li><a href="customers.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Customers</span></a></li>
        <li><a href="purchase.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span>Purchases</span></a></li>
        <li><a href="sales.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg><span>Sales</span></a></li>
        <li><a href="report.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Reports</span></a></li>
      </ul>
      <div class="nav-footer">
        <div class="user-info">
          <div class="user-avatar">A</div>
          <div class="user-details">
            <div class="user-name">Admin</div>
            <div class="user-role">admin</div>
          </div>
        </div>
        <button class="btn-logout" id="btn-logout">Sign Out</button>
      </div>
    </nav>

    <main class="main-content">
      <header class="top-bar">
        <span class="page-title">Products</span>
        <div class="top-bar-actions">
          <div class="search-bar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Search products..." id="product-search">
          </div>
        </div>
      </header>

      <div class="page-content">
        <div class="page-header">
          <h1>Products</h1>
          <div class="header-actions">
            <select id="filter-category" class="btn btn-outline btn-sm" style="font-size:0.8rem;padding:4px 10px;">
              <option value="">All Categories</option>
            </select>
            <div class="view-toggle">
              <button id="view-grid" class="active" title="Grid view">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
              </button>
              <button id="view-table" title="Table view">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              </button>
            </div>
            <button class="btn btn-primary" id="btn-add-product">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add Product
            </button>
          </div>
        </div>

        <!-- Collection Grid -->
        <div id="products-grid" class="collection-grid"></div>

        <!-- Dense Table -->
        <div id="products-table" class="dense-table-wrapper hidden">
          <table class="dense-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Buy Price</th>
                <th>Sell Price</th>
                <th>Stock</th>
                <th>Barcode</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="products-table-body"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Right-side panel for Add/Edit -->
  <div class="side-panel-overlay" id="product-panel-overlay"></div>
  <div class="side-panel" id="product-panel">
    <div class="side-panel-header">
      <h2 id="panel-title">Add Product</h2>
      <button class="btn btn-ghost btn-icon" onclick="closePanel('product-panel')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="side-panel-body">
      <form id="product-form">
        <div class="form-group">
          <label for="product-name">Product Name *</label>
          <input type="text" id="product-name" required placeholder="e.g. Wireless Mouse">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="product-category">Category</label>
            <select id="product-category"><option value="">Select...</option></select>
          </div>
          <div class="form-group">
            <label for="product-supplier">Supplier</label>
            <select id="product-supplier"><option value="">Select...</option></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="product-purchase-price">Purchase Price</label>
            <input type="number" id="product-purchase-price" step="0.01" min="0" value="0">
          </div>
          <div class="form-group">
            <label for="product-selling-price">Selling Price</label>
            <input type="number" id="product-selling-price" step="0.01" min="0" value="0">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="product-quantity">Quantity</label>
            <input type="number" id="product-quantity" min="0" value="0">
          </div>
          <div class="form-group">
            <label for="product-threshold">Low Stock Threshold</label>
            <input type="number" id="product-threshold" min="0" value="10">
          </div>
        </div>
        <div class="form-group">
          <label for="product-barcode">Barcode</label>
          <input type="text" id="product-barcode" placeholder="Optional">
          <span class="form-hint">Must be unique if provided</span>
        </div>
        <div class="form-group">
          <label for="product-description">Description</label>
          <textarea id="product-description" placeholder="Optional"></textarea>
        </div>
        <div class="form-group">
          <label for="product-image">Image</label>
          <input type="file" id="product-image" accept="image/*">
          <span class="form-hint">JPEG, PNG, GIF, WebP — max 2MB</span>
          <div id="image-preview" style="margin-top:8px;"></div>
        </div>
        <div class="side-panel-footer" style="padding:0;border:none;margin-top:var(--space-md);">
          <button type="button" class="btn btn-outline" onclick="closePanel('product-panel')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/ui/dialog.js"></script>
  <script src="../js/ui/toast.js"></script>
  <script src="../js/auth-check.js"></script>
  <script src="../js/products.js"></script>
</body>
</html>
