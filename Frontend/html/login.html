<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Inventory Management System</title>
  <meta name="description" content="Sign in to the Inventory Management System to manage products, stock, purchases, and sales.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Public+Sans:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-panel">
      <div class="login-brand">
        <!-- Gauge motif as small mark (§8.6) -->
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="14" cy="14" r="12" stroke="#35566B" stroke-width="2" fill="none"/>
          <path d="M 6 20 A 10 10 0 0 1 22 20" stroke="#C9BFAE" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M 6 20 A 10 10 0 0 1 18 8" stroke="#35566B" stroke-width="3" fill="none" stroke-linecap="round"/>
          <line x1="14" y1="14" x2="17" y2="9" stroke="#C8862B" stroke-width="2" stroke-linecap="round"/>
          <circle cx="14" cy="14" r="2" fill="#C8862B"/>
        </svg>
        <h1>IMS</h1>
      </div>

      <div id="login-error" class="login-error"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="admin@ims.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" id="login-submit" class="btn-login">Sign In</button>
      </form>

      <div class="login-footer" style="margin-top: 16px;">
        <p style="margin-bottom: 8px;">Don't have an account? <a href="signup.html" style="color: var(--primary); text-decoration: underline;">Sign Up</a></p>
        Inventory Management System v1.0
      </div>
    </div>
  </div>

  <script src="../js/login.js"></script>
</body>
</html>
